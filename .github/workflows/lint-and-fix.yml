name: Code Cleanup and Fix

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  fix-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci || npm install

    - name: Run ESLint and Auto-Fix
      run: npm run lint -- --fix || npx eslint src --fix || true

    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: automated code quality cleanup (removed unused imports/logs)"
